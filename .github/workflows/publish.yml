name: Publish Librarium Syncthing Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, without the leading v"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release
        shell: bash
        run: bash .github/scripts/validate-release.sh "${{ inputs.version }}"

      - name: Create release commit and tag
        shell: bash
        run: bash .github/scripts/create-release.sh "${{ inputs.version }}"

      - name: Resolve image metadata
        id: release
        shell: bash
        run: bash .github/scripts/resolve-image-metadata.sh "${{ inputs.version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.release.outputs.tags }}
          labels: ${{ steps.release.outputs.labels }}

      - name: Push release commit and tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:master
          git push origin "v${{ steps.release.outputs.version }}"
