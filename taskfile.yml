version: '3'

tasks:
  default:
    cmds:
      - task -l

  # Project management

  update:
    desc: Update the repo from upstream
    cmds:
      - git pull

  version:
    desc: Show the current project version
    cmds:
      - cat VERSION

  push:
    desc: Push commits and tags to GitHub
    cmds:
      - git push && git push --tags

  # Librarium

  volume:
    desc: Ensure the shared Librarium volume exists
    cmds:
      - docker volume create hex-librarium

  build:
    desc: Build the Librarium Syncthing image
    cmds:
      - docker compose build librarium-syncthing

  sync:
    desc: Run Syncthing in the foreground
    deps:
      - volume
    cmds:
      - docker compose up --build librarium-syncthing

  start-sync:
    desc: Run Syncthing as a detached service
    deps:
      - volume
    env:
      SYNCTHING_RESTART: unless-stopped
    cmds:
      - docker compose up -d --build librarium-syncthing

  end-sync:
    desc: Stop the detached Syncthing service
    cmds:
      - docker compose stop librarium-syncthing
